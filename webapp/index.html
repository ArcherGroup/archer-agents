<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archer Agent Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e8eef8 0%, #f4f7fc 50%, #ffffff 100%);
      color: #1a1a4e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(100,120,200,0.12);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 800;
      color: #1B1B8F;
      letter-spacing: -0.5px;
    }
    .logo-arrow {
      color: #4040CC;
      font-size: 22px;
    }
    .logo-badge {
      background: #EEF0FF;
      color: #4040CC;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4040CC, #1B1B8F);
      color: white;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* LAYOUT */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: rgba(255,255,255,0.7);
      border-right: 1px solid rgba(100,120,200,0.12);
      padding: 20px 0;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-section {
      padding: 12px 20px 4px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #aab;
      text-transform: uppercase;
    }
    .agent-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 20px;
      background: none;
      border: none;
      color: #556;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }
    .agent-btn:hover {
      background: rgba(64,64,204,0.06);
      color: #1B1B8F;
    }
    .agent-btn.active {
      background: rgba(64,64,204,0.08);
      color: #4040CC;
      border-left-color: #4040CC;
      font-weight: 600;
    }
    .agent-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccd;
      flex-shrink: 0;
    }
    .agent-btn.active .agent-dot {
      background: #4040CC;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 28px;
      border-bottom: 1px solid rgba(100,120,200,0.12);
      background: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-agent-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #4040CC22, #1B1B8F22);
      border: 1px solid #4040CC33;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #4040CC;
    }
    .chat-agent-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a4e;
    }
    .chat-agent-desc {
      font-size: 12px;
      color: #889;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      flex-shrink: 0;
      margin-left: auto;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #4040CC22, #1B1B8F22);
      color: #4040CC;
      border: 1px solid #4040CC22;
    }
    .message.user .message-avatar {
      background: linear-gradient(135deg, #4040CC, #1B1B8F);
      color: white;
    }
    .message-content {
      background: white;
      border: 1px solid rgba(100,120,200,0.15);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      color: #2a2a5e;
      box-shadow: 0 2px 8px rgba(64,64,204,0.06);
    }
    .message.user .message-content {
      background: linear-gradient(135deg, #4040CC, #2828aa);
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 12px rgba(64,64,204,0.25);
    }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, #4040CC, #1B1B8F);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      margin-bottom: 8px;
    }
    .welcome-title {
      font-size: 22px;
      font-weight: 800;
      color: #1B1B8F;
    }
    .welcome-sub {
      font-size: 14px;
      color: #889;
      max-width: 320px;
      line-height: 1.6;
    }

    /* INPUT */
    .input-area {
      padding: 16px 28px 20px;
      border-top: 1px solid rgba(100,120,200,0.12);
      background: rgba(255,255,255,0.6);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrap { flex: 1; }
    textarea {
      width: 100%;
      background: white;
      border: 1.5px solid rgba(100,120,200,0.2);
      border-radius: 12px;
      color: #1a1a4e;
      font-size: 14px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      min-height: 46px;
      max-height: 200px;
      transition: border-color 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(64,64,204,0.06);
    }
    textarea:focus {
      border-color: #4040CC;
      box-shadow: 0 0 0 3px rgba(64,64,204,0.1);
    }
    textarea::placeholder { color: #aab; }

    .send-btn {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, #4040CC, #1B1B8F);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      box-shadow: 0 4px 12px rgba(64,64,204,0.3);
    }
    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(64,64,204,0.4);
    }
    .send-btn:disabled {
      background: #dde;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* LOGIN */
    .login-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #e8eef8 0%, #f4f7fc 50%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-box {
      width: 380px;
      background: white;
      border: 1px solid rgba(100,120,200,0.15);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(64,64,204,0.12);
    }
    .login-logo {
      font-size: 28px;
      font-weight: 800;
      color: #1B1B8F;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13px;
      color: #889;
      margin-bottom: 28px;
    }
    .login-label {
      font-size: 12px;
      font-weight: 600;
      color: #556;
      margin-bottom: 6px;
    }
    .login-input {
      width: 100%;
      background: #f8f9ff;
      border: 1.5px solid rgba(100,120,200,0.2);
      border-radius: 10px;
      color: #1a1a4e;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      margin-bottom: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .login-input:focus { border-color: #4040CC; }
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #4040CC, #1B1B8F);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      margin-top: 6px;
      box-shadow: 0 4px 16px rgba(64,64,204,0.3);
      transition: all 0.15s;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(64,64,204,0.4);
    }
    .login-error {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* TYPING */
    .typing {
      display: flex;
      gap: 5px;
      padding: 4px 2px;
      align-items: center;
    }
    .typing span {
      width: 6px;
      height: 6px;
      background: #4040CC;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: 0.7;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* MARKDOWN */
    .message-content h1, .message-content h2, .message-content h3 {
      color: #1B1B8F;
      margin: 10px 0 5px;
    }
    .message-content strong { color: #1a1a4e; }
    .message.user .message-content strong { color: white; }
    .message.user .message-content h1,
    .message.user .message-content h2,
    .message.user .message-content h3 { color: white; }
    .message-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0;
      font-size: 13px;
    }
    .message-content th, .message-content td {
      border: 1px solid rgba(100,120,200,0.2);
      padding: 7px 12px;
    }
    .message-content th {
      background: #f0f2ff;
      color: #4040CC;
      font-weight: 600;
    }
    .message-content code {
      background: #f0f2ff;
      padding: 2px 6px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      color: #4040CC;
    }
    .message-content ul, .message-content ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .message-content li { margin: 3px 0; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100,120,200,0.2); border-radius: 3px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">&#x2197; archer</div>
    <div class="login-sub">Agent Hub — intern platform</div>
    <div class="login-label">Gebruikers-ID</div>
    <input class="login-input" type="text" id="loginUserId"
           placeholder="Jouw Supabase user ID" />
    <div class="login-label">Naam</div>
    <input class="login-input" type="text" id="loginName"
           placeholder="Jouw naam" />
    <button class="login-btn" onclick="login()">Inloggen →</button>
    <div class="login-error" id="loginError">Vul beide velden in</div>
  </div>
</div>

<!-- APP -->
<div class="header">
  <div class="header-logo">
    <div class="logo-text">&#x2197; archer</div>
    <div class="logo-badge">Agent Hub</div>
  </div>
  <div class="header-user">
    <div class="user-avatar" id="userAvatar"></div>
    <span id="headerUser"></span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">Strategie</div>
    <button class="agent-btn" onclick="selectAgent('ceo','CEO Agent','Strategie & groei naar €15-20M','CE')" id="btn-ceo">
      <div class="agent-dot"></div> CEO Agent
    </button>
    <button class="agent-btn" onclick="selectAgent('coo','COO Agent','Operaties, planning & pipeline','CO')" id="btn-coo">
      <div class="agent-dot"></div> COO Agent
    </button>

    <div class="sidebar-section">Sales</div>
    <button class="agent-btn" onclick="selectAgent('sales-manager','Sales Manager','Pipeline bewaking & forecast','SM')" id="btn-sales-manager">
      <div class="agent-dot"></div> Sales Manager
    </button>
    <button class="agent-btn" onclick="selectAgent('sales-trainer','Sales Trainer','Coaching, roleplay & transcripts','ST')" id="btn-sales-trainer">
      <div class="agent-dot"></div> Sales Trainer
    </button>
    <button class="agent-btn" onclick="selectAgent('hubspot','HubSpot Agent','CRM, pipeline & rapportages','HS')" id="btn-hubspot">
      <div class="agent-dot"></div> HubSpot Agent
    </button>

    <div class="sidebar-section">Marketing</div>
    <button class="agent-btn" onclick="selectAgent('copywriting','Copywriting Agent','Emails, VSL, social & website','CW')" id="btn-copywriting">
      <div class="agent-dot"></div> Copywriting
    </button>
    <button class="agent-btn" onclick="selectAgent('content-social','Content & Social','Kalender, podcast & distributie','CS')" id="btn-content-social">
      <div class="agent-dot"></div> Content & Social
    </button>

    <div class="sidebar-section">Tech</div>
    <button class="agent-btn" onclick="selectAgent('dev-assistent','Dev Assistent','Code, security & infrastructuur','DA')" id="btn-dev-assistent">
      <div class="agent-dot"></div> Dev Assistent
    </button>
  </div>

  <div class="chat-area">
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="chat-agent-icon" id="chatAgentIcon"></div>
      <div>
        <div class="chat-agent-name" id="chatAgentName"></div>
        <div class="chat-agent-desc" id="chatAgentDesc"></div>
      </div>
      <div class="status-dot"></div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">&#x2197;</div>
        <div class="welcome-title">Archer Agent Hub</div>
        <div class="welcome-sub">Kies een agent in het menu links om te beginnen.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="messageInput" placeholder="Stel een vraag aan de agent..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const SERVER = 'https://archer-agents-production.up.railway.app';
  let currentUser = null;
  let currentAgent = null;
  let currentAgentInitials = '';
  let currentSessionId = null;

  const saved = localStorage.getItem('archer_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    showApp();
  }

  function login() {
    const userId = document.getElementById('loginUserId').value.trim();
    const name = document.getElementById('loginName').value.trim();
    if (!userId || !name) {
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    currentUser = { id: userId, name };
    localStorage.setItem('archer_user', JSON.stringify(currentUser));
    showApp();
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('headerUser').textContent = currentUser.name;
    document.getElementById('userAvatar').textContent = currentUser.name.substring(0,2).toUpperCase();
  }

  function selectAgent(agentId, name, desc, initials) {
    currentAgent = agentId;
    currentAgentInitials = initials;
    currentSessionId = null;
    document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + agentId).classList.add('active');
    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('chatAgentIcon').textContent = initials;
    document.getElementById('chatAgentName').textContent = name;
    document.getElementById('chatAgentDesc').textContent = desc;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('messages').innerHTML = '';
    document.getElementById('messageInput').focus();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(role, content) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const initials = role === 'assistant'
      ? currentAgentInitials
      : currentUser.name.substring(0,2).toUpperCase();
    div.innerHTML = `
      <div class="message-avatar">${initials}</div>
      <div class="message-content">${formatMessage(content)}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function formatMessage(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/^### (.+)$/gm,'<h3>$1</h3>')
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/^# (.+)$/gm,'<h1>$1</h1>')
      .replace(/^- (.+)$/gm,'<li>$1</li>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\n/g,'<br>');
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if (!message || !currentAgent) return;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    addMessage('user', message);
    const messages = document.getElementById('messages');
    const typing = document.createElement('div');
    typing.className = 'message assistant';
    typing.innerHTML = `
      <div class="message-avatar">${currentAgentInitials}</div>
      <div class="message-content">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;
    try {
      const res = await fetch(`${SERVER}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          agentId: currentAgent,
          message,
          sessionId: currentSessionId,
          userId: currentUser.id
        })
      });
      const data = await res.json();
      typing.remove();
      if (data.reply) {
        currentSessionId = data.sessionId;
        addMessage('assistant', data.reply);
      } else {
        addMessage('assistant', 'Er ging iets mis: ' + (data.error || 'onbekende fout'));
      }
    } catch (err) {
      typing.remove();
      addMessage('assistant', 'Verbindingsfout — controleer of de server online is.');
    }
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
